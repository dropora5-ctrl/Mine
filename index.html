<script>
  function resizeCanvas() {
    canvas.width = window.innerWidth;

}
  const yesBtn = document.getElementById("yesBtn");

yesBtn.addEventListener("click", function () {

  function createBurst(symbol){
    const el = document.createElement("div");
    el.innerHTML = symbol;

    el.style.position = "fixed";
    el.style.left = "50%";
    el.style.top = "50%";
    el.style.fontSize = (Math.random()*20 + 20) + "px";
    el.style.zIndex = "9999";

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 300 + 100;

    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;

    el.style.transition = "1s ease-out";

    document.body.appendChild(el);

    setTimeout(() => {
        el.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random()*360}deg)`;
        el.style.opacity = "0";
    }, 10);

    setTimeout(() => el.remove(), 1000);
  }

/* ===== STAR ZOOM INTRO ===== */
const canvas = document.getElementById("introCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = Array.from({length:300},()=>({
    x:Math.random()*canvas.width-canvas.width/2,
    y:Math.random()*canvas.height-canvas.height/2,
    z:Math.random()*canvas.width
}));

function drawStars(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(s=>{
        s.z-=5;
        if(s.z<=0) s.z=canvas.width;

        let k=128/s.z;
        let x=s.x*k+canvas.width/2;
        let y=s.y*k+canvas.height/2;

        let size=(1-s.z/canvas.width)*3;
        ctx.fillRect(x,y,size,size);
    });

    requestAnimationFrame(drawStars);
}
drawStars();

/* ===== TRAILER TEXT ===== */
const trailerLines = [

];

let tIndex = 0;

function showTrailer() {
    const trailer = document.getElementById("trailer");
    const text = document.getElementById("tText");

    trailer.style.opacity = 1;

    function nextLine() {
        if (tIndex >= trailerLines.length) {
            trailer.style.opacity = 0;
            setTimeout(startMain, 1000);
            return;
        }

        text.innerHTML = trailerLines[tIndex];
        text.style.opacity = 1;

        setTimeout(() => {
            text.style.opacity = 0;
            tIndex++;
            setTimeout(nextLine, 800);
        }, 2000);
    }

    nextLine();
}
